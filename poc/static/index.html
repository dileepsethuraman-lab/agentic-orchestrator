<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Telecom Agentic Orchestration Engine — PoC Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid #1e293b;
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }
    .pulse { width: 10px; height: 10px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.02em; }
    .header .badge {
      font-size: 0.65rem; padding: 0.15rem 0.55rem; border-radius: 999px;
      background: rgba(34, 211, 238, 0.15); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.3);
    }
    /* Cache engine toggle */
    .cache-toggle { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
    .cache-toggle input { display: none; }
    .cache-slider {
      display: flex; align-items: center;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; overflow: hidden; height: 24px;
      font-size: 0.55rem; font-weight: 600; transition: all 0.2s;
    }
    .cache-option-left, .cache-option-right {
      padding: 0.15rem 0.45rem; transition: all 0.2s;
    }
    .cache-option-left { color: #22d3ee; background: rgba(34, 211, 238, 0.12); }
    .cache-option-right { color: #475569; }
    .cache-toggle input:checked + .cache-slider .cache-option-right {
      color: #fbbf24; background: rgba(251, 191, 36, 0.12);
    }
    .cache-toggle input:checked + .cache-slider .cache-option-left {
      color: #475569; background: transparent;
    }

    .main { display: flex; flex: 1; overflow: hidden; }
    .panel { padding: 1.25rem; overflow-y: auto; }
    .panel-left  { width: 420px; flex-shrink: 0; border-right: 1px solid #1e293b; background: rgba(15, 23, 42, 0.4); }
    .panel-right { flex: 1; background: rgba(2, 6, 23, 0.6); }

    .left-section { margin-bottom: 1.25rem; }
    .left-section label {
      display: block; font-size: 0.7rem; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem;
    }
    textarea {
      width: 100%; min-height: 160px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; padding: 0.75rem; resize: vertical; line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15); }

    .btn-row { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    button {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
      padding: 0.55rem 1rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: #22d3ee; color: #020617; }
    .btn-primary:hover { background: #67e8f9; }
    .btn-secondary { background: rgba(51, 65, 85, 0.5); color: #94a3b8; border: 1px solid #334155; }
    .btn-secondary:hover { background: rgba(51, 65, 85, 0.8); color: #e2e8f0; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .samples { margin-top: 0.5rem; }
    .sample-chip {
      display: block; width: 100%; text-align: left; padding: 0.45rem 0.6rem;
      background: rgba(30, 41, 59, 0.5); border: 1px solid #1e293b;
      border-radius: 6px; color: #94a3b8; font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; cursor: pointer; margin-bottom: 0.3rem; transition: all 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sample-chip:hover { background: rgba(34, 211, 238, 0.08); border-color: rgba(34, 211, 238, 0.3); color: #22d3ee; }

    /* Trace header */
    .trace-header {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem;
      padding-bottom: 0.75rem; border-bottom: 1px solid #1e293b;
    }
    .trace-header h2 { font-size: 0.85rem; font-weight: 600; }
    .trace-id { font-size: 0.6rem; color: #475569; }
    .trace-status { font-size: 0.65rem; padding: 0.15rem 0.55rem; border-radius: 999px; font-weight: 600; }
    .trace-status.blocked   { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .trace-status.running   { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
    .trace-status.error   { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

    /* Notification Timeline */
    .notif-timeline { margin: 0.4rem 0; padding: 0.6rem 0.8rem; background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.15); border-radius: 8px; }
    .notif-timeline h3 { font-size: 0.7rem; color: #06b6d4; margin-bottom: 0.5rem; font-weight: 600; }
    .notif-track { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding: 0.2rem 0; }
    .notif-node { display: flex; flex-direction: column; align-items: center; min-width: 80px; position: relative; }
    .notif-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; background: rgba(6, 182, 212, 0.2); border: 2px solid #06b6d4; color: #06b6d4; }
    .notif-dot.active { background: rgba(34, 197, 94, 0.25); border-color: #22c55e; color: #22c55e; }
    .notif-state { font-size: 0.5rem; color: #64748b; margin-top: 0.25rem; text-align: center; word-break: break-all; max-width: 80px; }
    .notif-connector { flex: 1; min-width: 20px; height: 2px; background: rgba(6, 182, 212, 0.3); margin-top: 13px; }
    .notif-connector.active { background: #22c55e; }

    .trace-status.completed { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }

    /* Trace steps */
    .trace-step {
      opacity: 0; transform: translateX(20px);
      animation: slideIn 0.35s ease-out forwards;
      margin-bottom: 0.5rem;
    }
    @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

    .step-card {
      border-radius: 10px; border: 1px solid; overflow: hidden;
      transition: all 0.2s; cursor: pointer;
    }
    .step-card:hover { box-shadow: 0 0 20px rgba(0,0,0,0.3); }

    .step-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.8rem;
      cursor: pointer; user-select: none;
    }
    .step-icon { font-size: 1.1rem; flex-shrink: 0; }
    .step-title { font-size: 0.75rem; font-weight: 600; flex: 1; }
    .step-elapsed { font-size: 0.6rem; opacity: 0.6; white-space: nowrap; }
    .step-body {
      padding: 0.6rem 0.8rem 0.8rem; font-size: 0.65rem; line-height: 1.55;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .step-body.hidden { display: none; }

    /* Step body field labels */
    .step-body .fl { color: #94a3b8; font-weight: 600; }
    .step-body .fv { color: #cbd5e1; }
    .step-body .fl-goal { color: #67e8f9; }
    .step-body .fl-in { color: #a78bfa; }
    .step-body .fl-exp { color: #fbbf24; }
    .step-body .fl-act { color: #4ade80; }
    .step-body .fl-out { color: #f472b6; }

    /* Color themes */
    .card-green  { border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.06); }
    .card-green .step-header  { background: rgba(34, 197, 94, 0.1); }
    .card-green .step-title   { color: #4ade80; }
    .card-green .step-body    { color: #bbf7d0; }

    .card-amber  { border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.06); }
    .card-amber .step-header  { background: rgba(251, 191, 36, 0.1); }
    .card-amber .step-title   { color: #fbbf24; }
    .card-amber .step-body    { color: #fde68a; }

    .card-red    { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.06); }
    .card-red .step-header    { background: rgba(239, 68, 68, 0.1); }
    .card-red .step-title     { color: #f87171; }
    .card-red .step-body      { color: #fecaca; }

    .card-blue   { border-color: rgba(59, 130, 246, 0.3); background: rgba(59, 130, 246, 0.06); }
    .card-blue .step-header   { background: rgba(59, 130, 246, 0.1); }
    .card-blue .step-title    { color: #60a5fa; }
    .card-blue .step-body     { color: #bfdbfe; }

    .card-violet { border-color: rgba(167, 139, 250, 0.3); background: rgba(167, 139, 250, 0.06); }
    .card-violet .step-header { background: rgba(167, 139, 250, 0.1); }
    .card-violet .step-title  { color: #a78bfa; }
    .card-violet .step-body   { color: #ddd6fe; }

    .card-cyan   { border-color: rgba(34, 211, 238, 0.3); background: rgba(34, 211, 238, 0.06); }
    .card-cyan .step-header   { background: rgba(34, 211, 238, 0.1); }
    .card-cyan .step-title    { color: #22d3ee; }
    .card-cyan .step-body     { color: #a5f3fc; }

    /* Running pulse */
    .card-running { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 8px rgba(34,211,238,0.15); } 50% { box-shadow: 0 0 20px rgba(34,211,238,0.35); } }

    /* Pattern Analysis section */
    .pattern-analysis {
      margin-top: 1rem; padding: 1rem 1.25rem; border-radius: 12px;
      border: 1px solid rgba(167, 139, 250, 0.25); background: rgba(167, 139, 250, 0.04);
      opacity: 0; animation: slideIn 0.5s 0.1s ease-out forwards;
    }
    .pattern-analysis h3 { font-size: 0.78rem; color: #a78bfa; margin-bottom: 0.75rem; }
    .pa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .pa-card {
      background: rgba(15, 23, 42, 0.6); border: 1px solid #1e293b;
      border-radius: 8px; padding: 0.7rem;
    }
    .pa-card-title { font-size: 0.6rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .pa-card-value { font-size: 0.72rem; font-weight: 700; }
    .pa-card-value.hi { color: #4ade80; }
    .pa-card-value.mi { color: #fbbf24; }
    .pa-card-value.lo { color: #f87171; }
    .pa-bar-wrap { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.35rem; }
    .pa-bar { flex: 1; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
    .pa-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .pa-tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.55rem; font-weight: 600; }
    .pa-tag.llm  { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .pa-tag.taught { background: rgba(34,197,94,0.15); color: #4ade80; }
    .pa-tag.cached { background: rgba(167,139,250,0.15); color: #a78bfa; }

    /* Suggestion box */
    .pa-suggestion {
      margin-top: 0.8rem; padding: 0.6rem 0.8rem; border-radius: 8px;
      border: 1px solid rgba(251,191,36,0.2); background: rgba(251,191,36,0.05);
      font-size: 0.6rem; color: #fcd34d;
    }
    .pa-suggestion .sug-icon { margin-right: 0.4rem; }

    /* Verification list */
    .verification-list { margin-top: 0.6rem; }
    .verification-list .v-item {
      display: flex; align-items: flex-start; gap: 0.4rem; padding: 0.2rem 0;
      font-size: 0.62rem;
    }
    .v-item .v-icon { font-size: 0.7rem; flex-shrink: 0; margin-top: 1px; }

    /* Final summary */
    .final-summary {
      margin-top: 1rem; padding: 1rem 1.25rem; border-radius: 12px;
      border: 2px solid rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.08);
      opacity: 0; animation: slideIn 0.5s 0.2s ease-out forwards;
    }
    .final-summary h3 { font-size: 0.78rem; color: #4ade80; margin-bottom: 0.5rem; }
    .kv { display: flex; gap: 2rem; flex-wrap: wrap; }
    .kv-item { font-size: 0.65rem; }
    .kv-label { color: #64748b; }
    .kv-value { color: #e2e8f0; font-weight: 600; }

    /* Network elements */
    .network-elements {
      margin-top: 1rem; padding: 1rem 1.25rem; border-radius: 12px;
      border: 1px solid rgba(59, 130, 246, 0.3); background: rgba(59, 130, 246, 0.05);
      opacity: 0; animation: slideIn 0.5s 0.3s ease-out forwards;
    }
    .network-elements h3 { font-size: 0.78rem; color: #60a5fa; margin-bottom: 0.75rem; }
    .ne-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.6rem; }
    .ne-card {
      background: rgba(15, 23, 42, 0.7); border: 1px solid #1e293b;
      border-radius: 8px; padding: 0.7rem; transition: border-color 0.2s; cursor: pointer;
    }
    .ne-card:hover { border-color: rgba(59, 130, 246, 0.4); }
    .ne-card-header {
      display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid #1e293b;
    }
    .ne-card-icon { font-size: 1rem; }
    .ne-card-name { font-size: 0.7rem; font-weight: 600; color: #e2e8f0; }
    .ne-card-wf { font-size: 0.55rem; color: #64748b; margin-left: auto; }
    .ne-attr { display: flex; justify-content: space-between; padding: 0.18rem 0; font-size: 0.6rem; }
    .ne-attr-key { color: #64748b; }
    .ne-attr-val { color: #94a3b8; font-weight: 500; max-width: 55%; text-align: right; overflow: hidden; text-overflow: ellipsis; }
    .ne-attr-val.status-ok { color: #4ade80; }

    /* DSL Reference panel — always-visible service definition catalog */
    .dsl-reference {
      margin-top: 1rem; padding: 0 1.25rem 1rem; border-bottom: 1px solid #1e293b;
    }
    .dsl-reference-header {
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
      padding: 0.6rem 0; user-select: none;
    }
    .dsl-reference-header h3 { font-size: 0.72rem; color: #60a5fa; font-weight: 600; }
    .dsl-reference-header .dsl-count {
      font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 4px;
      background: rgba(59, 130, 246, 0.12); color: #60a5fa;
    }
    .dsl-reference-header .dsl-chevron { font-size: 0.65rem; color: #64748b; transition: transform 0.2s; }
    .dsl-reference-header .dsl-chevron.open { transform: rotate(90deg); }
    .dsl-reference-body { display: none; }
    .dsl-reference-body.open { display: block; }
    .dsl-service-section { margin-bottom: 0.8rem; }
    .dsl-service-title {
      font-size: 0.65rem; font-weight: 600; color: #a78bfa;
      padding: 0.3rem 0; border-bottom: 1px solid rgba(167,139,250,0.15);
      margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem;
      cursor: pointer;
    }
    .dsl-service-title:hover { color: #c4b5fd; }
    .dsl-service-title .dsl-domain { font-weight: 400; color: #64748b; font-size: 0.58rem; }
    .dsl-ne-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.3rem; }
    .dsl-ne-chip {
      background: rgba(15, 23, 42, 0.6); border: 1px solid #1e293b;
      border-radius: 5px; padding: 0.35rem 0.5rem; font-size: 0.58rem;
      display: flex; align-items: center; gap: 0.35rem; transition: border-color 0.15s;
      cursor: pointer;
    }
    .dsl-ne-chip:hover { border-color: rgba(59,130,246,0.3); }
    .dsl-ne-chip .dsl-ne-icon { font-size: 0.75rem; flex-shrink: 0; }
    .dsl-ne-chip .dsl-ne-info { flex: 1; min-width: 0; }
    .dsl-ne-chip .dsl-ne-name { color: #e2e8f0; font-weight: 500; }
    .dsl-ne-chip .dsl-ne-wf { color: #475569; font-size: 0.52rem; margin-top: 0.1rem; }
    .dsl-ne-chip .dsl-ne-attrs { color: #64748b; font-size: 0.5rem; margin-top: 0.15rem; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: #475569; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.75rem; line-height: 1.6; }

    /* Zoom */
    .zoom-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(2, 6, 23, 0.75); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }
    .zoom-backdrop.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .zoom-container {
      width: 96vw; max-width: 1200px; max-height: 94vh; overflow-y: auto;
      border-radius: 12px; animation: zoomIn 0.25s ease-out;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }
    @keyframes zoomIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .zoom-container .step-card, .zoom-container .ne-card { padding: 2rem 2.5rem; min-width: 600px; font-size: 1.05rem; border-width: 2px; }
    .zoom-container .step-header { padding: 0.8rem 1rem; }
    .zoom-container .step-icon { font-size: 1.6rem; }
    .zoom-container .step-title { font-size: 1.2rem; font-weight: 700; }
    .zoom-container .step-elapsed { font-size: 0.85rem; }
    .zoom-container .step-body { font-size: 0.95rem; line-height: 1.8; padding: 1rem 1rem 1rem 2.5rem; }
    .zoom-container .ne-card-name { font-size: 1.05rem; }
    .zoom-container .ne-card-wf { font-size: 0.75rem; }
    .zoom-container .ne-attr { font-size: 0.85rem; padding: 0.35rem 0; }
    .zoom-container .ne-card { padding: 1.5rem 1.75rem; min-width: 400px; }
    .zoom-container .ne-grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
    .zoom-container .ne-card-icon { font-size: 1.4rem; }
    /* DSL zoom — large */
    .zoom-container .dsl-ne-chip {
      padding: 2rem 2.5rem; min-width: 500px; font-size: 1.4rem; border-width: 2px;
      border-color: rgba(59,130,246,0.5); border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
    }
    .zoom-container .dsl-ne-chip .dsl-ne-icon { font-size: 2.5rem; }
    .zoom-container .dsl-ne-chip .dsl-ne-name { font-size: 1.5rem; font-weight: 700; }
    .zoom-container .dsl-ne-chip .dsl-ne-wf { font-size: 1.1rem; color: #94a3b8; margin-top: 0.3rem; }
    .zoom-container .dsl-ne-chip .dsl-ne-attrs { font-size: 1rem; color: #94a3b8; margin-top: 0.25rem; }
    .zoom-container .dsl-service-section {
      background: rgba(15, 23, 42, 0.9); border: 2px solid rgba(167,139,250,0.5);
      border-radius: 10px; padding: 2rem 2.5rem; min-width: 550px;
    }
    .zoom-container .dsl-service-title {
      font-size: 1.3rem; padding: 0.6rem 0; margin-bottom: 1rem;
      border-bottom-color: rgba(167,139,250,0.3);
    }
    .zoom-container .dsl-service-title .dsl-domain { font-size: 1rem; }
    .zoom-container .dsl-ne-list {
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 0.7rem;
    }
    .zoom-close-hint {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.75rem; color: #64748b; pointer-events: none;
      animation: fadeIn 0.3s 1s ease-out forwards; opacity: 0;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="pulse"></div>
    <h1>Telecom Agentic Orchestration Engine</h1>
    <span class="badge">PoC Demo</span>
  </div>

  <div class="main">
    <div class="panel panel-left">
      <div class="left-section">
        <label>Service Request</label>
        <textarea id="prompt" placeholder="Enter a TMF640/TMF641 JSON payload or unstructured text...&#10;&#10;e.g. activate new mobile service 088888 for retail customer with gold SLA"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-submit" onclick="submitRequest()">▶ Execute</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      <div class="left-section" style="margin-top:1.2rem;padding:0.8rem;border:2px solid rgba(59,130,246,0.4);border-radius:8px;background:rgba(59,130,246,0.06);">
        <label style="color:#60a5fa !important;font-size:0.75rem;">⚡ Cache Engine</label>
        <div style="display:flex;align-items:center;gap:0.8rem;margin-top:0.5rem;">
          <label class="cache-toggle">
            <input type="checkbox" id="cache-toggle" onchange="toggleCacheEngine()">
            <span class="cache-slider" style="height:36px;font-size:0.75rem;font-weight:700;border-color:rgba(59,130,246,0.5);">
              <span class="cache-option-left" style="padding:0.3rem 1rem;">Pattern</span>
              <span class="cache-option-right" style="padding:0.3rem 1rem;">DSL</span>
            </span>
          </label>
        </div>
        <div id="cache-engine-desc" style="font-size:0.62rem;color:#94a3b8;margin-top:0.5rem;line-height:1.4;"></div>
      </div>
      <div class="left-section" style="margin-top:1.2rem;">
        <label>Sample Requests</label>
        <div class="samples" id="samples"></div>
      </div>
    </div>

    <div class="panel panel-right" id="trace-panel">
      <div class="empty-state" id="empty-state">
        <div class="icon">⚙️</div>
        <p>Submit a service request on the left to see the orchestration pipeline.</p>
      </div>
      <div id="trace-content" style="display:none;">
        <div class="trace-header">
          <h2 id="trace-title">Pipeline Trace</h2>
          <span class="trace-id" id="trace-id"></span>
          <span class="trace-status" id="trace-status" style="margin-left:auto;"></span>
        </div>
        <div id="trace-steps"></div>
        <div id="notification-timeline"></div>
        <div id="pattern-analysis"></div>
        <div id="final-summary"></div>
        <div id="network-elements"></div>
      </div>

      <!-- DSLs — runtime-populated after DSL-engine request completes -->
      <div class="dsl-reference" id="dsl-reference" style="display:none;">
        <div class="dsl-reference-header" onclick="toggleDslReference()">
          <span class="dsl-chevron" id="dsl-chevron">▶</span>
          <h3>📋 DSLs</h3>
          <span class="dsl-count" id="dsl-count"></span>
        </div>
        <div class="dsl-reference-body" id="dsl-reference-body">
          <div id="dsl-reference-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="zoom-backdrop" id="zoom-backdrop" onclick="closeZoom(event)">
    <div class="zoom-container" id="zoom-container" onclick="event.stopPropagation()"></div>
  </div>
  <div class="zoom-close-hint" id="zoom-hint">Click anywhere outside to close · Esc</div>

  <script>
    // ── Cache Engine Toggle ─────────────────────────────
    let currentCacheEngine = 'pattern';

    async function initCacheConfig() {
      try {
        const resp = await fetch('/api/config/cache');
        const data = await resp.json();
        currentCacheEngine = data.engine;
        document.getElementById('cache-toggle').checked = (data.engine === 'dsl');
        const desc = document.getElementById('cache-engine-desc');
        if (desc) {
          desc.textContent = data.engine === 'dsl'
            ? 'YAML DSL templates — deterministic plans, zero-latency, always HIT for known services'
            : 'RDF auto-learning pattern store with Jaccard similarity — learns from every orchestration';
        }
      } catch (e) {
        console.warn('Failed to load cache config:', e);
      }
    }

    async function toggleCacheEngine() {
      const checked = document.getElementById('cache-toggle').checked;
      const engine = checked ? 'dsl' : 'pattern';
      const desc = document.getElementById('cache-engine-desc');
      try {
        const resp = await fetch('/api/config/cache', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ engine }),
        });
        const data = await resp.json();
        if (data.status === 'ok') {
          currentCacheEngine = data.engine;
          if (desc) {
            desc.textContent = data.engine === 'dsl'
              ? 'YAML DSL templates — deterministic plans, zero-latency, always HIT for known services'
              : 'RDF auto-learning pattern store with Jaccard similarity — learns from every orchestration';
          }
          console.log('Cache engine:', data.message);
        }
      } catch (e) {
        console.error('Failed to toggle cache engine:', e);
        document.getElementById('cache-toggle').checked = !checked;
      }
    }

    // ── Runtime DSL Display ──────────────────────────────────
    // Shown only after a request completes with DSL cache engine.
    // Displays the populated Service DSL, Intent DSL, and NE trace.

    const NE_ICONS = {
      'HLR-HSS': '🗄️', 'IMS-Core': '📞', 'PCRF-PCF': '📋', 'SMSC': '💬',
      'MSC-MME': '📶', 'SBC': '🔊',
      'PE-Router': '🔀', 'Route-Reflector': '🔄', 'VRF-Instance': '📊', 'NMS': '🖥️',
      'vCPE-uCPE': '☁️', 'SD-WAN-Controller': '🎛️', 'Orchestrator': '⚙️',
      'OLT': '📡', 'BNG-BRAS': '🌐', 'RADIUS': '🔐', 'EMS': '🖥️',
    };

    function toggleDslReference() {
      const body = document.getElementById('dsl-reference-body');
      const chevron = document.getElementById('dsl-chevron');
      const isOpen = body.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
      chevron.textContent = isOpen ? '▼' : '▶';
    }

    function renderRuntimeDSLs(fs) {
      const pm = fs.patternMatch || {};
      if (pm.result !== 'DSL') {
        // Hide DSL panel when NOT using DSL engine (prevent cross-engine leakage)
        document.getElementById('dsl-reference').style.display = 'none';
        return;
      }

      const dslTemplate = fs.dslTemplate || {};
      const prov = pm.dslProvenance || {};
      const operation = fs.dslOperation || 'activate';
      const populatedNEs = fs.dslTrace || [];

      // Show the section
      const section = document.getElementById('dsl-reference');
      section.style.display = '';

      const included = populatedNEs.filter(n => n.decision === 'INCLUDE').length;
      const skipped = populatedNEs.filter(n => n.decision === 'SKIP').length;
      document.getElementById('dsl-count').textContent =
        `${included + skipped} NEs · ${operation}`;

      let html = '';

      // ── Service DSL ──
      const sd = dslTemplate.populated_service_definition || {};
      const tmf = sd.tmfProperties || {};
      const lifecycle = (sd.lifecycle || {}).acknowledged || {};
      const sdSupportingServices = (lifecycle.supportingServices || []);
      const relationships = sd.serviceRelationship || [];
      const entities = sd.entityRelationship || [];

      html += `<div class="dsl-service-section">
        <div class="dsl-service-title">
          <span>Service DSL</span>
          <span class="dsl-domain">— ${escapeHtml(dslTemplate.system_code || prov.systemCode || '?')} ${escapeHtml(dslTemplate.version || prov.templateVersion || '')}</span>
        </div>
        <div class="dsl-meta" style="font-size:0.58rem;color:#64748b;margin-bottom:0.4rem;">
          TMF: ${escapeHtml(tmf.name || dslTemplate.tmf_name || '?')} ·
          ${tmf.specification ? `spec: ${escapeHtml(tmf.specification)} · ` : ''}
          Schema: ${escapeHtml(prov.schemaStatus || '?')} ·
          Source: ${escapeHtml((prov.sourceFiles || []).join(', ') || '?')}
        </div>`;

      // Service relationships
      if (relationships.length) {
        html += `<div class="dsl-meta" style="font-size:0.55rem;color:#64748b;margin-bottom:0.3rem;">
          Service Relationships: ${relationships.map(r => {
            const key = Object.keys(r)[0]; const v = r[key];
            return `<code style="color:#60a5fa;">${escapeHtml(key)}</code> → ${escapeHtml(v.alias || '')}`;
          }).join(' · ')}
        </div>`;
      }

      // Variables
      if (sd.variables) {
        html += `<div class="dsl-meta" style="font-size:0.55rem;color:#64748b;margin-bottom:0.3rem;">
          Variables: ${Object.entries(sd.variables).map(([k,v]) =>
            `<code style="color:#94a3b8;">${escapeHtml(k)}</code>=<code style="color:#e2e8f0;">${escapeHtml(String(v))}</code>`).join(', ')}
        </div>`;
      }

      // Lifecycle — show the full resolved supporting services from the service definition
      if (sdSupportingServices.length) {
        html += `<div style="margin-top:0.4rem;font-size:0.6rem;color:#a78bfa;font-weight:600;">Lifecycle · acknowledged</div>`;
        html += `<div class="dsl-ne-list" style="margin-top:0.2rem;">`;

        for (const entry of sdSupportingServices) {
          const svcName = Object.keys(entry)[0];
          const svcDef = entry[svcName] || {};
          const innerServices = svcDef.supportingServices || [];
          const chars = {};
          for (const inner of innerServices) {
            const sc = inner.serviceCharacteristics || {};
            Object.assign(chars, sc);
          }
          const charEntries = Object.entries(chars);

          html += `<div class="dsl-ne-chip" style="border-color:rgba(59,130,246,0.3);cursor:default;">
            <span class="dsl-ne-icon">📦</span>
            <div class="dsl-ne-info">
              <div class="dsl-ne-name" style="color:#60a5fa;">${escapeHtml(svcName)}</div>
              <div class="dsl-ne-wf" style="color:#64748b;">${escapeHtml(svcDef.parentToChildRelationship || 'supports')}</div>
              ${charEntries.length ? `<div class="dsl-ne-attrs" style="color:#4ade80;">
                ${charEntries.slice(0,8).map(([k,v]) => {
                  const val = String(v);
                  const color = val.startsWith('<') ? '#fbbf24' : '#4ade80';
                  return `<code style="color:${color};">${escapeHtml(k)}=${escapeHtml(val)}</code>`;
                }).join(' ')}
              </div>` : ''}
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      // Entity relationships
      if (entities.length) {
        html += `<div class="dsl-meta" style="font-size:0.55rem;color:#64748b;margin-top:0.3rem;">
          Entities: ${entities.map(e => {
            const key = Object.keys(e)[0]; const v = e[key];
            return `<code style="color:#a78bfa;">${escapeHtml(key)}</code> (${escapeHtml(v.task || '')})`;
          }).join(' · ')}
        </div>`;
      }

      html += `</div>`;

      // ── Intent DSL ──
      const intent = dslTemplate.intent || {};
      const svcList = intent.supporting_services || [];
      html += `<div class="dsl-service-section" style="margin-top:0.8rem;">
        <div class="dsl-service-title">
          <span>Intent DSL</span>
          <span class="dsl-domain">— operation = <span style="color:#fbbf24;">${escapeHtml(operation)}</span></span>
        </div>`;

      for (const svc of svcList) {
        const chars = svc.characteristics || {};
        const charEntries = Object.entries(chars);
        html += `<div class="dsl-ne-chip" style="border-color:rgba(167,139,250,0.3);cursor:default;">
          <span class="dsl-ne-icon">🔗</span>
          <div class="dsl-ne-info">
            <div class="dsl-ne-name" style="color:#a78bfa;">${escapeHtml(svc.name)}</div>
            <div class="dsl-ne-wf" style="color:#64748b;">${escapeHtml(svc.relationship)}</div>
            ${charEntries.length ? `<div class="dsl-ne-attrs" style="color:#4ade80;">
              ${charEntries.map(([k,v]) => `<code>${escapeHtml(k)}</code>=<code style="color:#e2e8f0;">${escapeHtml(String(v))}</code>`).join(', ')}
            </div>` : ''}
          </div>
        </div>`;
      }
      html += '</div>';

      // ── Network Elements ──
      html += `<div class="dsl-service-section" style="margin-top:0.8rem;">
        <div class="dsl-service-title">
          <span>Network Elements</span>
          <span class="dsl-domain">— ${included} included · ${skipped} skipped</span>
        </div>
        <div class="dsl-ne-list">`;

      for (const ne of populatedNEs) {
        const icon = NE_ICONS[ne.name] || (ne.decision === 'SKIP' ? '⏭️' : '🔷');
        const borderCls = ne.decision === 'SKIP' ? 'style="border-color:rgba(248,113,113,0.3);opacity:0.6;"' : '';
        const conds = ne.conditions || [];
        const attrs = ne.attributes || {};
        const attrEntries = Object.entries(attrs).slice(0, 8);

        html += `<div class="dsl-ne-chip" ${borderCls}>
          <span class="dsl-ne-icon">${icon}</span>
          <div class="dsl-ne-info">
            <div class="dsl-ne-name">
              ${ne.decision === 'SKIP' ? '<span style="color:#f87171;">✗</span> ' : '<span style="color:#4ade80;">✓</span> '}
              ${escapeHtml(ne.name)}
              ${ne.ne_id ? `<span style="font-size:0.5rem;color:#475569;margin-left:0.3rem;">${escapeHtml(ne.ne_id)}</span>` : ''}
            </div>
            <div class="dsl-ne-wf">↳ ${escapeHtml(ne.workflow)}</div>
            ${attrEntries.length ? `<div class="dsl-ne-attrs">
              ${attrEntries.map(([k,v]) => `<code style="color:#94a3b8;">${escapeHtml(k)}</code>=<code style="color:${String(v).startsWith('<')?'#fbbf24':'#4ade80'};">${escapeHtml(String(v))}</code>`).join(' · ')}
            </div>` : ''}
            ${conds.length ? `<div class="dsl-ne-attrs" style="color:#fbbf24;">if: ${escapeHtml(conds.join(' && '))}</div>` : ''}
          </div>
        </div>`;
      }
      html += '</div></div>';

      document.getElementById('dsl-reference-content').innerHTML = html;
    }

    async function loadSamples() {
      const resp = await fetch('/api/samples');
      const data = await resp.json();
      const container = document.getElementById('samples');
      data.samples.forEach(s => {
        const chip = document.createElement('button');
        chip.className = 'sample-chip';
        chip.textContent = s.label;
        chip.onclick = () => { document.getElementById('prompt').value = s.text; };
        container.appendChild(chip);
      });
    }

    function clearAll() {
      document.getElementById('prompt').value = '';
      document.getElementById('trace-content').style.display = 'none';
      document.getElementById('empty-state').style.display = '';
      document.getElementById('trace-steps').innerHTML = '';
      document.getElementById('notification-timeline').innerHTML = '';
      document.getElementById('final-summary').innerHTML = '';
      document.getElementById('network-elements').innerHTML = '';
      document.getElementById('pattern-analysis').innerHTML = '';
      // Clear DSL Reference panel (prevent cross-engine leakage)
      const dslRef = document.getElementById('dsl-reference');
      dslRef.style.display = 'none';
      document.getElementById('dsl-reference-content').innerHTML = '';
      document.getElementById('dsl-reference-body').classList.remove('open');
      document.getElementById('dsl-chevron').classList.remove('open');
      document.getElementById('dsl-chevron').textContent = '▶';
    }

    async function submitRequest() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = '⏳ Submitting...';

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('trace-content').style.display = '';
      document.getElementById('trace-steps').innerHTML = '';
      document.getElementById('notification-timeline').innerHTML = '';
      document.getElementById('final-summary').innerHTML = '';
      document.getElementById('network-elements').innerHTML = '';
      document.getElementById('pattern-analysis').innerHTML = '';

      document.getElementById('trace-title').textContent = 'Pipeline Trace';
      document.getElementById('trace-id').textContent = '';
      const statusEl = document.getElementById('trace-status');
      statusEl.textContent = 'PROCESSING';
      statusEl.className = 'trace-status running';

      const stepsContainer = document.getElementById('trace-steps');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'trace-step';
      loadingDiv.style.animationDelay = '0s';
      loadingDiv.innerHTML = `<div class="step-card card-blue"><div class="step-header"><span class="step-icon">⏳</span><span class="step-title">Submitting — dispatching pipeline...</span></div><div class="step-body">Determining cache status...</div></div>`;
      stepsContainer.appendChild(loadingDiv);
      document.getElementById('trace-panel').scrollTop = document.getElementById('trace-panel').scrollHeight;

      let dots = 0;
      const loadingInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        const title = stepsContainer.querySelector('.step-title');
        if (title) title.textContent = 'Submitting — dispatching pipeline' + '.'.repeat(dots);
      }, 1000);

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 130000);
        const resp = await fetch('/api/process', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }), signal: controller.signal,
        });
        clearTimeout(timeoutId);
        clearInterval(loadingInterval);
        stepsContainer.innerHTML = '';

        let data;
        const text = await resp.text();
        try { data = JSON.parse(text); }
        catch (jsonErr) {
          stepsContainer.innerHTML = `<div class="step-card card-red" style="padding:1rem;border-radius:10px;"><span style="color:#f87171;">❌ Tunnel error</span><br><small style="color:#fca5a5;">Response: ${escapeHtml(text.substring(0, 200))}</small></div>`;
          statusEl.textContent = 'TUNNEL ERROR'; statusEl.className = 'trace-status blocked'; return;
        }

        document.getElementById('trace-id').textContent = data.order_id;

        if (data.status === 'processing') {
          data.trace.forEach((step, i) => renderStep(step, i));
          await pollUntilDone(data.order_id, statusEl, btn, data.started_at);
          return;
        }

        if (data.status === 'completed') {
          statusEl.textContent = 'COMPLETED'; statusEl.className = 'trace-status completed';
        } else if (data.status === 'blocked') {
          statusEl.textContent = 'BLOCKED'; statusEl.className = 'trace-status blocked';
        } else {
          statusEl.textContent = 'ERROR'; statusEl.className = 'trace-status blocked';
        }

        stepsContainer.innerHTML = '';
        data.trace.forEach((step, i) => renderStep(step, i));
        if (data.final_state && data.status === 'completed') {
          setTimeout(() => showFinalOutput(data), data.trace.length * 120 + 200);
        }
      } catch (err) {
        clearInterval(loadingInterval);
        if (stepsContainer.firstChild) stepsContainer.innerHTML = '';
        if (err.name === 'AbortError') {
          statusEl.textContent = 'TIMEOUT';
          document.getElementById('trace-steps').innerHTML = `<div class="step-card card-red" style="padding:1rem;border-radius:10px;"><span style="color:#f87171;">⏱ Request timed out after 130 seconds.</span><br><small style="color:#fca5a5;">The LLM call may be taking too long or the tunnel dropped.</small></div>`;
        } else {
          statusEl.textContent = 'ERROR'; statusEl.className = 'trace-status blocked';
          document.getElementById('trace-steps').innerHTML = `<div class="step-card card-red" style="padding:1rem;border-radius:10px;"><span style="color:#f87171;">❌ Connection error: ${escapeHtml(err.message)}</span></div>`;
        }
      } finally {
        btn.disabled = false; btn.textContent = '▶ Execute';
      }
    }

    async function pollUntilDone(orderId, statusEl, btn, startedAt) {
      statusEl.textContent = 'PROCESSING'; statusEl.className = 'trace-status running';
      const elapsedEl = document.getElementById('trace-id');
      const startTime = startedAt ? new Date(startedAt).getTime() : Date.now();
      const timerInterval = setInterval(() => {
        const secs = Math.floor((Date.now() - startTime) / 1000);
        elapsedEl.textContent = `⏱ ${secs}s elapsed — polling...`;
      }, 1000);
      try {
        for (let attempt = 0; attempt < 120; attempt++) {
          await new Promise(r => setTimeout(r, 2000));
          try {
            const resp = await fetch(`/api/process/${orderId}`);
            const data = await resp.json();
            const container = document.getElementById('trace-steps');
            container.innerHTML = '';
            data.trace.forEach((step, i) => renderStep(step, i));
            data.trace.forEach((step, i) => {
              if (step.status === 'running') {
                const cards = container.querySelectorAll('.step-card');
                if (cards[i]) cards[i].classList.add('card-running');
              }
            });
            if (data.status === 'completed') {
              clearInterval(timerInterval);
              statusEl.textContent = 'COMPLETED'; statusEl.className = 'trace-status completed';
              elapsedEl.textContent = '';
              if (data.final_state) showFinalOutput(data);
              btn.disabled = false; btn.textContent = '▶ Execute';
              return;
            }
            if (data.status === 'blocked') {
              clearInterval(timerInterval);
              statusEl.textContent = 'BLOCKED'; statusEl.className = 'trace-status blocked';
              elapsedEl.textContent = '';
              btn.disabled = false; btn.textContent = '▶ Execute';
              return;
            }
          } catch(e) { /* retry */ }
        }
      } finally { clearInterval(timerInterval); elapsedEl.textContent = ''; }
      statusEl.textContent = 'TIMEOUT'; statusEl.className = 'trace-status blocked';
      btn.disabled = false; btn.textContent = '▶ Execute';
    }

    /* --- Step rendering --- */
    function formatDetail(text) {
      if (!text) return '';
      const labels = [
        ['Goal:', 'fl-goal'], ['Input:', 'fl-in'], ['Expected:', 'fl-exp'],
        ['Actual:', 'fl-act'], ['Output:', 'fl-out']
      ];
      let out = escapeHtml(text);
      // Replace literal \n (backslash-n from Python f-string \\n) AND real newlines
      out = out.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
      labels.forEach(([label, cls]) => {
        out = out.replace(new RegExp(`^${label}`, 'gm'), `<span class="fl ${cls}">${label}</span>`);
      });
      return out;
    }

    function renderStep(step, i) {
      const div = document.createElement('div');
      div.style.animationDelay = `${i * 0.08}s`;
      div.innerHTML = `<div class="step-card card-${step.color}"><div class="step-header" onclick="this.parentElement.querySelector('.step-body').classList.toggle('hidden')"><span class="step-icon">${step.icon}</span><span class="step-title">${escapeHtml(step.title)}</span><span class="step-elapsed">${step.ms || step.elapsed_ms}ms</span></div><div class="step-body">${formatDetail(step.detail)}</div></div>`;
      document.getElementById('trace-steps').appendChild(div);
    }

    /* --- Final output: pattern analysis + summary + NEs --- */
    function showFinalOutput(data) {
      const fs = data.final_state;
      if (fs) {
        renderNotificationTimeline(fs);
        buildPatternAnalysis(fs);
        renderRuntimeDSLs(fs);
        setTimeout(() => {
          document.getElementById('final-summary').innerHTML = buildSummaryHTML(data.total_ms, fs);
          if (fs.networkElements) renderNetworkElements(fs.networkElements, fs.subscriberDiff);
          const notifEl = document.getElementById('notification-timeline');
          if (notifEl) notifEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 200);
      }
    }

    function renderNotificationTimeline(fs) {
      const notifs = fs.notifications || [];
      if (!notifs.length) {
        document.getElementById('notification-timeline').innerHTML = '';
        return;
      }
      let html = '<div class="notif-timeline"><h3>📬 TMF Lifecycle Notifications</h3><div class="notif-track">';
      notifs.forEach((n, i) => {
        // Extract state from TMF641 event structure:
        // Milestones: event.serviceOrder.milestone[0].name
        // StateChange: event.serviceOrder.state
        let state = '?';
        const so = (n.event && n.event.serviceOrder) || {};
        if (so.milestone && so.milestone.length) {
          state = so.milestone[0].name || '?';
        } else if (so.state) {
          state = so.state;
        }
        const icon = i === notifs.length - 1 ? '✅' : '●';
        html += `<div class="notif-node">
          <div class="notif-dot active" title="${escapeHtml(n.eventTime || '')}">${icon}</div>
          <div class="notif-state">${escapeHtml(state)}</div></div>`;
        if (i < notifs.length - 1) {
          html += '<div class="notif-connector active"></div>';
        }
      });
      html += '</div></div>';
      document.getElementById('notification-timeline').innerHTML = html;
    }

    function buildPatternAnalysis(fs) {
      const pm = fs.patternMatch || {};
      const isHit = pm.result === 'HIT';
      const pct = Math.round((fs.patternConfidence || 0) * 100);
      const barCls = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
      const tagCls = fs.llmUsed ? 'llm' : 'cached';
      const tagLabel = fs.llmUsed ? 'LLM Learned' : 'Cache Hit';

      let suggestion = '';
      if (isHit) {
        if (pct < 40) suggestion = 'Low confidence — run more requests with identical characteristics to reinforce the pattern. Consider teaching explicit patterns for edge cases.';
        else if (pct < 70) suggestion = 'Moderate confidence — additional runs with similar characteristics will strengthen the match. Pattern is stabilizing.';
        else if (pct < 95) suggestion = 'Good confidence — pattern is well-established. Continue using to approach 100%.';
        else suggestion = 'Excellent confidence — pattern is mature and reliable across all matching requests.';
      } else {
        suggestion = 'No pattern matched. This run created a new pattern. Repeat identical requests to build confidence. For faster matching, teach patterns directly via /api/patterns/teach.';
      }

      const verifications = [
        ['🔒', 'Security validation', 'Destructive keyword scan passed — no blocked commands in plan'],
        ['📋', 'Schema validation', 'Plan structure verified — workflows, params, and devices present'],
        ['🔗', 'Resource binding', `${fs.workflowsExecuted || 0} workflows mapped to ${fs.resourcesProvisioned || 0} configuration parameters`],
        ['🧠', 'LLM reasoning', fs.llmUsed ? 'Deepseek v4 generated plan from KB context' : 'Cached plan retrieved — no LLM call needed'],
        ['📡', 'Pattern learning', fs.patternId ? `Pattern ${fs.patternId.substring(0,20)}... stored (${pct}% confidence)` : 'No new pattern stored'],
      ];

      let html = `<div class="pattern-analysis">
        <h3>🔬 Pattern Analysis &amp; Verification</h3>
        <div class="pa-grid">
          <div class="pa-card">
            <div class="pa-card-title">Confidence</div>
            <div class="pa-card-value ${barCls === 'high' ? 'hi' : barCls === 'mid' ? 'mi' : 'lo'}">${pct}%</div>
            <div class="pa-bar-wrap">
              <div class="pa-bar"><div class="pa-bar-fill ${barCls}" style="width:${pct}%"></div></div>
              <span class="pa-tag ${tagCls}">${tagLabel}</span>
            </div>
          </div>
          <div class="pa-card">
            <div class="pa-card-title">Pattern</div>
            <div class="pa-card-value" style="font-size:0.62rem;color:#cbd5e1;">${fs.patternId ? fs.patternId : '—'}</div>
            <div style="margin-top:0.4rem;font-size:0.55rem;color:#64748b;">
              ${isHit ? `Matched via ${pm.compareLogic || 'Jaccard'} · ${pm.useCount || 0} prior uses · Score: ${Math.round((pm.score||0)*100)}%` : `${pm.patternsForService || 0} patterns for service, ${pm.patternsInStore || 0} total`}
            </div>
          </div>
        </div>
        <div class="verification-list">
          <div class="pa-card-title" style="margin-bottom:0.3rem;">Verifications</div>
          ${verifications.map(v => `<div class="v-item"><span class="v-icon">${v[0]}</span><span><b style="color:#94a3b8;">${v[1]}</b> — ${v[2]}</span></div>`).join('')}
        </div>
        <div class="pa-suggestion"><span class="sug-icon">💡</span>${suggestion}</div>
      </div>`;
      document.getElementById('pattern-analysis').innerHTML = html;
    }

    function buildSummaryHTML(total_ms, fs) {
      const diff = fs.subscriberDiff || {};
      let modelInfo = '';
      if (diff.hasPrevious) {
        const changed = Object.keys(diff.changedAttributes || {}).length;
        const neDiffs = Object.keys(diff.networkElementDiffs || {}).length;
        modelInfo = `<div style="margin-top:0.5rem;font-size:0.6rem;">
          <span style="color:#94a3b8;">Subscriber:</span> <span style="color:#e2e8f0;">${escapeHtml(fs.subscriberId || '—')}</span>
          ${changed > 0 || neDiffs > 0
            ? `<span style="color:#fbbf24;margin-left:0.5rem;">● UPDATED</span> · ${changed} attrs changed, ${neDiffs} NEs modified`
            : `<span style="color:#64748b;margin-left:0.5rem;">○ unchanged</span>`}
        </div>`;
      } else {
        modelInfo = `<div style="margin-top:0.5rem;font-size:0.6rem;">
          <span style="color:#94a3b8;">Subscriber:</span> <span style="color:#e2e8f0;">${escapeHtml(fs.subscriberId || '—')}</span>
          <span style="color:#4ade80;margin-left:0.5rem;">● First provisioning — model v1 saved</span>
        </div>`;
      }
      return `<div class="final-summary">
        <h3>✅ Orchestration Complete — ${total_ms}ms</h3>
        <div class="kv">
          <div class="kv-item"><span class="kv-label">Service ID: </span><span class="kv-value">${fs.serviceId}</span></div>
          <div class="kv-item"><span class="kv-label">State: </span><span class="kv-value">${fs.state}</span></div>
          <div class="kv-item"><span class="kv-label">Workflows: </span><span class="kv-value">${fs.workflowsExecuted}</span></div>
          <div class="kv-item"><span class="kv-label">Resources: </span><span class="kv-value">${fs.resourcesProvisioned}</span></div>
        </div>${modelInfo}
      </div>`;
    }

    function renderNetworkElements(elements, diff) {
      if (!elements || !elements.length) return;
      const neDiffs = (diff && diff.networkElementDiffs) || {};
      const icons = { 'HLR': '🗄️', 'IMS-Core': '📞', 'PCRF': '📋', 'SMSC': '💬',
                      'PE-RTR-01': '🔀', 'PE-RTR-02': '🔀', 'Route-Reflector': '🔄', 'NMS': '🖥️',
                      'vCPE-01': '☁️', 'vCPE-02': '☁️', 'SD-WAN-Ctrl': '🎛️', 'Orchestrator': '⚙️',
                      'OLT-01': '📡', 'BNG-01': '🌐', 'RADIUS-01': '🔐', 'EMS': '🖥️' };
      const container = document.getElementById('network-elements');
      let html = '<div class="network-elements"><h3>🖧 Network Elements — Post-Activation State</h3><div class="ne-grid">';
      elements.forEach(el => {
        const icon = icons[el.name] || '🔷';
        const elDiffs = neDiffs[el.name] || {};
        const hasChanges = Object.keys(elDiffs).length > 0;
        html += `<div class="ne-card"${hasChanges ? ' style="border-color:#fbbf24;border-left:3px solid #fbbf24;"' : ''}>
          <div class="ne-card-header">
            <span class="ne-card-icon">${icon}</span><span class="ne-card-name">${el.name}</span>
            ${hasChanges ? `<span style="font-size:0.6rem;font-weight:700;color:#1e293b;background:#fbbf24;padding:1px 6px;border-radius:3px;margin-left:0.4rem;">⚡ MODIFIED (${Object.keys(elDiffs).length})</span>` : ''}
            <span class="ne-card-wf">${el.workflow}</span>
          </div>`;
        for (const [k, v] of Object.entries(el.attributes || {})) {
          const valClass = k === 'status' ? (v.match(/Active|Provisioned|Registered|In-Service|Configured|Established/i) ? 'status-ok' : '') : '';
          const changed = elDiffs[k];
          let valHtml = escapeHtml(v);
          if (changed) {
            valHtml = `<span style="color:#fbbf24;">${escapeHtml(changed.to)}</span>
              <span style="font-size:0.7rem;color:#f87171;text-decoration:line-through;opacity:0.65;margin-left:0.3rem;">${escapeHtml(changed.from)}</span>`;
          }
          html += `<div class="ne-attr"><span class="ne-attr-key">${k}</span><span class="ne-attr-val ${valClass}">${valHtml}</span></div>`;
        }
        html += '</div>';
      });
      html += '</div></div>';
      container.innerHTML = html;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadSamples();
    initCacheConfig();

    /* --- Zoom --- */
    function openZoom(el) {
      const backdrop = document.getElementById('zoom-backdrop');
      const container = document.getElementById('zoom-container');
      const hint = document.getElementById('zoom-hint');
      const clone = el.cloneNode(true);
      const body = clone.querySelector('.step-body');
      if (body) body.classList.remove('hidden');
      container.innerHTML = '';
      container.appendChild(clone);
      backdrop.classList.add('active');
      hint.style.opacity = '1';
      document.body.style.overflow = 'hidden';
    }
    function closeZoom(e) {
      if (e && e.target !== document.getElementById('zoom-backdrop')) return;
      document.getElementById('zoom-backdrop').classList.remove('active');
      document.getElementById('zoom-container').innerHTML = '';
      document.getElementById('zoom-hint').style.opacity = '0';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeZoom({target: document.getElementById('zoom-backdrop')}); });
    document.getElementById('trace-panel').addEventListener('click', (e) => {
      const card = e.target.closest('.step-card') || e.target.closest('.ne-card');
      if (!card) return;
      if (e.target.closest('.step-header')) return;
      openZoom(card);
    });
    // DSL panel zoom — click a chip or a service section title
    document.getElementById('dsl-reference').addEventListener('click', (e) => {
      const chip = e.target.closest('.dsl-ne-chip');
      if (chip) { openZoom(chip); return; }
      const section = e.target.closest('.dsl-service-section');
      if (section && e.target.closest('.dsl-service-title')) {
        openZoom(section);
      }
    });
    const _origClearAll = clearAll;
    clearAll = function() { _origClearAll(); closeZoom({target: document.getElementById('zoom-backdrop')}); };
  </script>
</body>
</html>
