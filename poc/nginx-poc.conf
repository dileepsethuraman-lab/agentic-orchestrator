# Nginx reverse proxy for Telecom Orchestrator PoC
# Install:  sudo apt install -y nginx
# Deploy:   sudo cp poc/nginx-poc.conf /etc/nginx/sites-available/orchestrator-poc
#           sudo ln -s /etc/nginx/sites-available/orchestrator-poc /etc/nginx/sites-enabled/
#           sudo rm /etc/nginx/sites-enabled/default  # if present
#           sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
