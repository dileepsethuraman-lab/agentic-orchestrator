# Telecom Java PoC — Application Properties
server.port=8091
server.address=0.0.0.0
spring.application.name=telecom-orchestrator

# H2 embedded database (persisted to file, like diskcache SQLite)
spring.datasource.url=jdbc:h2:file:./data/cache_store;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (debug only, disable in prod)
spring.h2.console.enabled=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.property-naming-strategy=SNAKE_CASE
